<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tshwpx API Docs</title>
<style>
:root { --bg: #f7f8fa; --surface: #fff; --text: #1f2933; --muted: #667085; --line: #d7dde5; --accent: #0f6b5f; }
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--text); font-family: "Segoe UI", "Malgun Gothic", Arial, sans-serif; line-height: 1.6; }
main { width: min(960px, calc(100% - 32px)); margin: 0 auto; padding: 42px 0; }
h1 { margin: 0 0 8px; font-size: 32px; line-height: 1.2; letter-spacing: 0; }
p { margin: 0; color: var(--muted); }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; margin-top: 28px; }
a.card { display: block; min-height: 150px; padding: 20px; border: 1px solid var(--line); border-radius: 8px; background: var(--surface); color: inherit; text-decoration: none; }
.card strong { display: block; margin-bottom: 8px; font-size: 18px; }
.card span { color: var(--muted); }
.note { margin-top: 24px; padding-top: 18px; border-top: 1px solid var(--line); font-size: 14px; }
</style>
</head>
<body>
<main>
  <h1>tshwpx API Docs</h1>
  <p>Hancom HwpAutomation 2504 원본과 TSHWPX API 문서를 나눴습니다.</p>

  <div class="grid">
    <a class="card" href="v2/index.html">
      <strong>v2 TSHWPX API</strong>
      <span>TSHWPX의 app.* 모듈 목록부터 정리하는 가공 문서입니다.</span>
    </a>
    <a class="card" href="v1/index.html">
      <strong>v1 원본 HTML</strong>
      <span>공식 2504 PDF 변환본입니다. 원문 확인과 페이지 기준 추적용으로 보관합니다.</span>
    </a>
  </div>

  <p class="note">v2는 원문을 다시 옮기는 문서가 아니라, 한글 오토메이션과 TSHWPX 연동 상태를 정리하는 문서입니다.</p>
</main>
</body>
</html>
